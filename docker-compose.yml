version: '3.8'

services:
  # API 服务
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./silicon_world.db:/app/silicon_world.db
      - ./uploads:/app/uploads
    environment:
      - DATABASE_URL=sqlite:///./silicon_world.db
      - API_HOST=0.0.0.0
      - API_PORT=8000
    restart: unless-stopped
    networks:
      - silicon-network

  # Dashboard
  dashboard:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./web/dashboard:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - silicon-network

  # Redis (可选，用于缓存)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - silicon-network

networks:
  silicon-network:
    driver: bridge

volumes:
  redis-data:
