<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>硅基世界 - 世界编辑器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        #canvas { width: 100vw; height: 100vh; display: block; }
        
        /* 工具栏 */
        #toolbar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 10px;
            z-index: 1000;
        }
        
        .tool-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .tool-btn:hover {
            background: rgba(98, 0, 238, 0.7);
        }
        
        .tool-btn.active {
            background: #6200ee;
        }
        
        /* 属性面板 */
        #properties {
            position: absolute;
            top: 60px;
            right: 20px;
            width: 300px;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 20px;
            border-radius: 12px;
            z-index: 1000;
        }
        
        #properties h3 {
            margin-bottom: 15px;
            color: #6200ee;
        }
        
        .prop-group {
            margin-bottom: 15px;
        }
        
        .prop-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            color: #aaa;
        }
        
        .prop-group input, .prop-group select {
            width: 100%;
            padding: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: white;
            font-size: 14px;
        }
        
        /* 资源库 */
        #assets {
            position: absolute;
            top: 60px;
            left: 20px;
            width: 250px;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 20px;
            border-radius: 12px;
            z-index: 1000;
        }
        
        #assets h3 {
            margin-bottom: 15px;
            color: #6200ee;
        }
        
        .asset-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        
        .asset-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .asset-item:hover {
            background: rgba(98, 0, 238, 0.7);
        }
        
        .asset-icon {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .asset-name {
            font-size: 12px;
        }
        
        /* 场景树 */
        #scene-tree {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 300px;
            max-height: 200px;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 20px;
            border-radius: 12px;
            overflow-y: auto;
            z-index: 1000;
        }
        
        #scene-tree h3 {
            margin-bottom: 10px;
            color: #6200ee;
        }
        
        .scene-item {
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        
        .scene-item:hover {
            background: rgba(98, 0, 238, 0.7);
        }
        
        .scene-item.selected {
            background: #6200ee;
        }
        
        /* 状态栏 */
        #status-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            padding: 0 20px;
            color: white;
            font-size: 12px;
            gap: 20px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <!-- 工具栏 -->
    <div id="toolbar">
        <button class="tool-btn active" data-tool="select">选择</button>
        <button class="tool-btn" data-tool="move">移动</button>
        <button class="tool-btn" data-tool="rotate">旋转</button>
        <button class="tool-btn" data-tool="scale">缩放</button>
        <div style="flex: 1;"></div>
        <button class="tool-btn" onclick="editor.save()">💾 保存</button>
        <button class="tool-btn" onclick="editor.load()">📂 加载</button>
        <button class="tool-btn" onclick="editor.undo()">↩️ 撤销</button>
        <button class="tool-btn" onclick="editor.redo()">↪️ 重做</button>
    </div>
    
    <!-- 属性面板 -->
    <div id="properties">
        <h3>属性</h3>
        <div class="prop-group">
            <label>位置 X</label>
            <input type="number" id="prop-x" step="0.1">
        </div>
        <div class="prop-group">
            <label>位置 Y</label>
            <input type="number" id="prop-y" step="0.1">
        </div>
        <div class="prop-group">
            <label>位置 Z</label>
            <input type="number" id="prop-z" step="0.1">
        </div>
        <div class="prop-group">
            <label>名称</label>
            <input type="text" id="prop-name">
        </div>
        <div class="prop-group">
            <label>类型</label>
            <select id="prop-type">
                <option value="building">建筑</option>
                <option value="prop">道具</option>
                <option value="terrain">地形</option>
            </select>
        </div>
    </div>
    
    <!-- 资源库 -->
    <div id="assets">
        <h3>资源库</h3>
        <div class="asset-grid">
            <div class="asset-item" data-type="building" data-model="house">
                <div class="asset-icon">🏠</div>
                <div class="asset-name">房屋</div>
            </div>
            <div class="asset-item" data-type="building" data-model="tower">
                <div class="asset-icon">🏢</div>
                <div class="asset-name">高楼</div>
            </div>
            <div class="asset-item" data-type="prop" data-model="tree">
                <div class="asset-icon">🌲</div>
                <div class="asset-name">树</div>
            </div>
            <div class="asset-item" data-type="prop" data-model="rock">
                <div class="asset-icon">🪨</div>
                <div class="asset-name">石头</div>
            </div>
            <div class="asset-item" data-type="terrain" data-model="grass">
                <div class="asset-icon">🌿</div>
                <div class="asset-name">草地</div>
            </div>
            <div class="asset-item" data-type="terrain" data-model="water">
                <div class="asset-icon">💧</div>
                <div class="asset-name">水</div>
            </div>
        </div>
    </div>
    
    <!-- 场景树 -->
    <div id="scene-tree">
        <h3>场景</h3>
        <div id="scene-list"></div>
    </div>
    
    <!-- 状态栏 -->
    <div id="status-bar">
        <span id="fps-counter">FPS: 60</span>
        <span id="object-count">物体：0</span>
        <span id="selection-info">未选择物体</span>
    </div>
    
    <script type="module">
        import { WorldEditor } from './editor.js';
        
        // 创建编辑器
        window.editor = new WorldEditor('canvas');
        
        // 工具栏事件
        document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                editor.setTool(this.dataset.tool);
            });
        });
        
        // 资源库事件
        document.querySelectorAll('.asset-item').forEach(item => {
            item.addEventListener('click', function() {
                editor.addAsset(this.dataset.type, this.dataset.model);
            });
        });
        
        // 属性面板事件
        ['prop-x', 'prop-y', 'prop-z', 'prop-name', 'prop-type'].forEach(id => {
            document.getElementById(id).addEventListener('input', function() {
                editor.updateSelectedProperty(this.id.replace('prop-', ''), this.value);
            });
        });
        
        console.log('世界编辑器已加载');
    </script>
</body>
</html>
