<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建 NFT - 硅基世界</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 900px; margin: 0 auto; }
        
        /* 导航栏 */
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            padding: 1rem 2rem;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
            text-decoration: none;
        }
        
        .nav-links { display: flex; gap: 2rem; }
        .nav-links a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
        }
        .nav-links a:hover { color: #667eea; }
        
        /* 头部 */
        .header {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            font-size: 2rem;
            color: #667eea;
            margin-bottom: 0.5rem;
        }
        
        .header p { color: #666; }
        
        /* 表单卡片 */
        .form-card {
            background: white;
            border-radius: 12px;
            padding: 2.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .form-section {
            margin-bottom: 2rem;
        }
        
        .section-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 500;
        }
        
        .form-label .required {
            color: #e74c3c;
            margin-left: 0.25rem;
        }
        
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .form-help {
            font-size: 0.85rem;
            color: #999;
            margin-top: 0.5rem;
        }
        
        /* 上传区域 */
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }
        
        .upload-area:hover {
            background: #f0f0f0;
            border-color: #5568d3;
        }
        
        .upload-area.dragover {
            background: #e8e8ff;
            border-color: #667eea;
        }
        
        .upload-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        .upload-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 0.5rem;
        }
        
        .upload-desc {
            color: #999;
            font-size: 0.9rem;
        }
        
        .upload-preview {
            margin-top: 1.5rem;
            display: none;
        }
        
        .upload-preview.show {
            display: block;
        }
        
        .preview-image {
            max-width: 300px;
            max-height: 300px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .preview-emoji {
            font-size: 8rem;
            display: block;
        }
        
        /* 属性网格 */
        .properties-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }
        
        /* 版税滑块 */
        .royalty-slider {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: #e0e0e0;
            outline: none;
            -webkit-appearance: none;
        }
        
        .royalty-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.4);
        }
        
        .royalty-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
            text-align: center;
            margin-top: 0.5rem;
        }
        
        /* 提交按钮 */
        .submit-section {
            margin-top: 2rem;
            text-align: center;
        }
        
        .btn-submit {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 1.25rem 4rem;
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* 成功提示 */
        .success-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .success-modal.show {
            display: flex;
        }
        
        .success-content {
            background: white;
            border-radius: 16px;
            padding: 3rem;
            text-align: center;
            max-width: 500px;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .success-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }
        
        .success-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 0.5rem;
        }
        
        .success-desc {
            color: #666;
            margin-bottom: 2rem;
        }
        
        .success-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .properties-grid { grid-template-columns: 1fr; }
            .form-card { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 导航栏 -->
        <nav class="navbar">
            <a href="../dashboard/index.html" class="logo">🌍 硅基世界</a>
            <div class="nav-links">
                <a href="index.html">市场</a>
                <a href="collection.html">我的 NFT</a>
                <a href="create.html" class="active">创建</a>
                <a href="activity.html">活动</a>
            </div>
        </nav>
        
        <!-- 头部 -->
        <div class="header">
            <h1>🎨 创建 NFT</h1>
            <p>将你的数字资产铸造为独一无二的 NFT</p>
        </div>
        
        <!-- 表单 -->
        <div class="form-card">
            <form id="createForm">
                <!-- 基本信息 -->
                <div class="form-section">
                    <h3 class="section-title">📝 基本信息</h3>
                    
                    <div class="form-group">
                        <label class="form-label">
                            NFT 类型 <span class="required">*</span>
                        </label>
                        <select class="form-select" id="nftType" required>
                            <option value="">选择类型</option>
                            <option value="land">🏠 土地</option>
                            <option value="building">🏢 建筑</option>
                            <option value="item">🎒 物品</option>
                            <option value="artwork">🎨 艺术品</option>
                            <option value="identity">🎭 身份</option>
                            <option value="music">🎵 音乐</option>
                            <option value="collectible">⭐ 收藏品</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">
                            名称 <span class="required">*</span>
                        </label>
                        <input type="text" class="form-input" id="nftName" placeholder="例如：中心城地块 #001" required>
                        <div class="form-help">给你的 NFT 起一个吸引人的名字</div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">
                            描述 <span class="required">*</span>
                        </label>
                        <textarea class="form-textarea" id="nftDescription" placeholder="描述你的 NFT 的特点、用途、故事..." required></textarea>
                        <div class="form-help">详细描述有助于提高 NFT 的价值</div>
                    </div>
                </div>
                
                <!-- 上传文件 -->
                <div class="form-section">
                    <h3 class="section-title">📁 上传文件</h3>
                    
                    <div class="upload-area" id="uploadArea">
                        <div class="upload-icon">📤</div>
                        <div class="upload-title">点击或拖拽文件到此处</div>
                        <div class="upload-desc">支持 JPG, PNG, GIF, MP4, MP3 (最大 10MB)</div>
                        <input type="file" id="fileInput" style="display: none;" accept="image/*,video/*,audio/*">
                    </div>
                    
                    <div class="upload-preview" id="uploadPreview">
                        <!-- 预览内容动态生成 -->
                    </div>
                </div>
                
                <!-- 属性 -->
                <div class="form-section">
                    <h3 class="section-title">⚙️ 属性设置</h3>
                    
                    <div class="properties-grid">
                        <div class="form-group">
                            <label class="form-label">稀有度</label>
                            <select class="form-select" id="rarity">
                                <option value="common">普通</option>
                                <option value="rare">稀有</option>
                                <option value="epic">史诗</option>
                                <option value="legendary">传说</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">供应量</label>
                            <input type="number" class="form-input" id="supply" value="1" min="1" max="10000">
                            <div class="form-help">1 = 唯一，>1 = 多个副本</div>
                        </div>
                    </div>
                </div>
                
                <!-- 定价 -->
                <div class="form-section">
                    <h3 class="section-title">💰 定价设置</h3>
                    
                    <div class="form-group">
                        <label class="form-label">
                            价格 (SIL) <span class="required">*</span>
                        </label>
                        <input type="number" class="form-input" id="price" placeholder="0" step="0.01" min="0" required>
                        <div class="form-help">设置为 0 表示暂不出售</div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">
                            版税 (%)
                        </label>
                        <input type="range" class="royalty-slider" id="royalty" min="0" max="15" value="5">
                        <div class="royalty-value" id="royaltyValue">5%</div>
                        <div class="form-help">每次转售你将获得的版税比例</div>
                    </div>
                </div>
                
                <!-- 提交 -->
                <div class="submit-section">
                    <button type="submit" class="btn-submit" id="submitBtn">
                        <span>✨</span>
                        <span>创建 NFT</span>
                    </button>
                    <div class="form-help" style="margin-top: 1rem;">
                        创建需要支付少量 Gas 费用
                    </div>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 成功弹窗 -->
    <div class="success-modal" id="successModal">
        <div class="success-content">
            <div class="success-icon">🎉</div>
            <h2 class="success-title">NFT 创建成功！</h2>
            <p class="success-desc" id="successMessage">你的 NFT 已铸造并上架</p>
            <div class="success-actions">
                <button class="btn-submit" onclick="viewNFT()">查看 NFT</button>
                <button class="btn-submit" style="background: #f0f0f0; color: #333;" onclick="closeModal()">关闭</button>
            </div>
        </div>
    </div>
    
    <script>
        // 上传区域交互
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const uploadPreview = document.getElementById('uploadPreview');
        
        uploadArea.addEventListener('click', () => fileInput.click());
        
        fileInput.addEventListener('change', handleFileSelect);
        
        // 拖拽
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });
        
        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) {
                handleFile(file);
            }
        }
        
        function handleFile(file) {
            // 检查文件大小
            if (file.size > 10 * 1024 * 1024) {
                alert('文件大小不能超过 10MB');
                return;
            }
            
            // 预览
            const reader = new FileReader();
            reader.onload = (e) => {
                if (file.type.startsWith('image/')) {
                    uploadPreview.innerHTML = `<img src="${e.target.result}" class="preview-image" alt="预览">`;
                } else if (file.type.startsWith('video/')) {
                    uploadPreview.innerHTML = `<video src="${e.target.result}" class="preview-image" controls></video>`;
                } else if (file.type.startsWith('audio/')) {
                    uploadPreview.innerHTML = `<div class="preview-emoji">🎵</div><div style="margin-top: 1rem;">${file.name}</div>`;
                }
                uploadPreview.classList.add('show');
            };
            reader.readAsDataURL(file);
        }
        
        // 版税滑块
        const royaltySlider = document.getElementById('royalty');
        const royaltyValue = document.getElementById('royaltyValue');
        
        royaltySlider.addEventListener('input', () => {
            royaltyValue.textContent = `${royaltySlider.value}%`;
        });
        
        // 表单提交
        document.getElementById('createForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span>⏳</span><span>创建中...</span>';
            
            // 模拟创建过程
            await new Promise(resolve => setTimeout(resolve, 2000));
            
            // 获取表单数据
            const formData = {
                type: document.getElementById('nftType').value,
                name: document.getElementById('nftName').value,
                description: document.getElementById('nftDescription').value,
                rarity: document.getElementById('rarity').value,
                supply: document.getElementById('supply').value,
                price: document.getElementById('price').value,
                royalty: document.getElementById('royalty').value
            };
            
            console.log('创建 NFT:', formData);
            
            // 显示成功
            btn.disabled = false;
            btn.innerHTML = '<span>✨</span><span>创建 NFT</span>';
            
            document.getElementById('successMessage').textContent = 
                `"${formData.name}" 已成功铸造！`;
            document.getElementById('successModal').classList.add('show');
        });
        
        function viewNFT() {
            window.location.href = 'collection.html';
        }
        
        function closeModal() {
            document.getElementById('successModal').classList.remove('show');
            document.getElementById('createForm').reset();
            uploadPreview.classList.remove('show');
            royaltyValue.textContent = '5%';
        }
        
        // 类型图标映射
        const typeIcons = {
            'land': '🏠',
            'building': '🏢',
            'item': '🎒',
            'artwork': '🎨',
            'identity': '🎭',
            'music': '🎵',
            'collectible': '⭐'
        };
        
        // 动态更新名称预览
        document.getElementById('nftName').addEventListener('input', (e) => {
            const type = document.getElementById('nftType').value;
            const icon = typeIcons[type] || '🎨';
            document.title = `${icon} ${e.target.value || '创建 NFT'} - 硅基世界`;
        });
    </script>
</body>
</html>
