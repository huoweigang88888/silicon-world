<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT 交易 - 硅基世界</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            padding: 1rem 2rem;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .logo { font-size: 1.5rem; font-weight: bold; color: #667eea; text-decoration: none; }
        .nav-links { display: flex; gap: 2rem; }
        .nav-links a { text-decoration: none; color: #333; font-weight: 500; }
        .nav-links a:hover, .nav-links a.active { color: #667eea; }
        
        .header {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .header h1 { font-size: 2rem; color: #667eea; }
        
        .network-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 25px;
            font-weight: 600;
        }
        
        .tabs {
            background: white;
            border-radius: 12px;
            padding: 1rem 2rem;
            margin-bottom: 20px;
            display: flex;
            gap: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .tab {
            padding: 0.75rem 1.5rem;
            border: none;
            background: #f0f0f0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .tab:hover { background: #e0e0e0; }
        .tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .content-section { display: none; }
        .content-section.active { display: block; }
        
        .nft-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin-bottom: 20px;
        }
        
        .nft-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
        }
        
        .nft-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
        }
        
        .nft-image {
            width: 100%;
            height: 280px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 4rem;
        }
        
        .nft-info { padding: 1.25rem; }
        
        .nft-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 0.5rem;
        }
        
        .nft-price {
            font-size: 1.25rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 1rem;
        }
        
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .btn-buy {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-buy:hover { transform: scale(1.05); }
        
        .btn-sell {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-sell:hover { background: #e0e0e0; }
        
        .status-box {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 1.5rem;
            margin-top: 2rem;
            display: none;
        }
        
        .status-box.show { display: block; }
        .status-success { border-left: 4px solid #10b981; }
        .status-error { border-left: 4px solid #ef4444; }
        .status-pending { border-left: 4px solid #f59e0b; }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .empty-icon { font-size: 5rem; margin-bottom: 1.5rem; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 导航栏 -->
        <nav class="navbar">
            <a href="../dashboard/index.html" class="logo">🌍 硅基世界</a>
            <div class="nav-links">
                <a href="index.html">市场</a>
                <a href="collection.html">我的 NFT</a>
                <a href="trade.html" class="active">交易</a>
            </div>
            <div class="network-badge" id="networkInfo">⛓️ 连接中...</div>
        </nav>
        
        <!-- 头部 -->
        <div class="header">
            <h1>💱 NFT 交易</h1>
            <div style="color: #666;">买卖 NFT，管理你的交易</div>
        </div>
        
        <!-- 标签页 -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('buy')">🛒 购买</button>
            <button class="tab" onclick="switchTab('sell')">📤 出售</button>
            <button class="tab" onclick="switchTab('my')">📋 我的交易</button>
        </div>
        
        <!-- 购买页面 -->
        <div class="content-section active" id="buyTab">
            <div class="nft-grid" id="buyGrid">
                <!-- 动态生成 -->
            </div>
            <div class="empty-state" id="buyEmpty" style="display: none;">
                <div class="empty-icon">🛒</div>
                <h2>暂无可购买的 NFT</h2>
                <p style="color: #666; margin-top: 1rem;">去市场逛逛吧！</p>
            </div>
        </div>
        
        <!-- 出售页面 -->
        <div class="content-section" id="sellTab">
            <div class="nft-grid" id="sellGrid">
                <!-- 动态生成 -->
            </div>
            <div class="empty-state" id="sellEmpty" style="display: none;">
                <div class="empty-icon">📤</div>
                <h2>暂无可出售的 NFT</h2>
                <p style="color: #666; margin-top: 1rem;">先铸造一些 NFT 吧！</p>
            </div>
        </div>
        
        <!-- 我的交易页面 -->
        <div class="content-section" id="myTab">
            <div class="nft-grid" id="myGrid">
                <!-- 动态生成 -->
            </div>
            <div class="empty-state" id="myEmpty" style="display: none;">
                <div class="empty-icon">📋</div>
                <h2>暂无交易记录</h2>
                <p style="color: #666; margin-top: 1rem;">完成第一笔交易后这里会显示记录</p>
            </div>
        </div>
        
        <!-- 状态显示 -->
        <div class="status-box" id="statusBox">
            <div style="font-weight: 600; margin-bottom: 0.5rem;" id="statusTitle"></div>
            <div style="color: #666; font-size: 0.9rem;" id="statusMessage"></div>
        </div>
    </div>
    
    <!-- 加载库 -->
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.9.0/dist/ethers.umd.min.js"></script>
    <script src="../js/wallet.js"></script>
    <script src="../js/contracts.js"></script>
    
    <script>
        // 全局变量
        let wallet = null;
        let contractManager = null;
        let currentUser = null;
        
        // 模拟数据 (实际应从合约读取)
        const mockListings = [
            { id: 1, tokenId: 1, name: '中心城地块 #001', type: 'land', price: '1.0', seller: '0x1234...5678', image: '🏠' },
            { id: 2, tokenId: 2, name: '商业大厦 #042', type: 'building', price: '5.0', seller: '0xabcd...efgh', image: '🏢' },
            { id: 3, tokenId: 3, name: '数字艺术 #123', type: 'artwork', price: '0.5', seller: '0x9876...5432', image: '🎨' },
        ];
        
        const mockMyNFTs = [
            { tokenId: 10, name: '我的地块 #010', type: 'land', image: '🏠' },
            { id: 11, tokenId: 11, name: '我的艺术品 #011', type: 'artwork', image: '🎨' },
        ];
        
        // 初始化
        async function init() {
            try {
                wallet = new window.SiliconWallet();
                contractManager = new window.ContractManager();
                
                const rpcUrl = 'https://goerli.infura.io/v3/9aa3d95b3bc440fa88ea12eaa4456161';
                await contractManager.init(rpcUrl, wallet);
                
                const network = await contractManager.getNetwork();
                document.getElementById('networkInfo').textContent = 
                    `⛓️ ${network.name === 'goerli' ? 'Goerli 测试网' : '未知网络'} (ID: ${network.chainId})`;
                
                // 检查是否有钱包
                const hasWallet = await wallet.hasWallet();
                if (hasWallet) {
                    const password = prompt('请输入钱包密码解锁:');
                    if (password) {
                        await wallet.unlockWallet(password);
                        currentUser = wallet.address;
                        console.log('✅ 钱包已解锁:', currentUser);
                    }
                }
                
                // 加载数据
                loadBuyTab();
                loadSellTab();
                loadMyTab();
                
                console.log('✅ 初始化成功');
            } catch (error) {
                console.error('❌ 初始化失败:', error);
                showStatus('error', '初始化失败：' + error.message);
            }
        }
        
        // 切换标签页
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
        }
        
        // 加载购买页面
        function loadBuyTab() {
            const grid = document.getElementById('buyGrid');
            const empty = document.getElementById('buyEmpty');
            
            if (mockListings.length === 0) {
                grid.style.display = 'none';
                empty.style.display = 'block';
                return;
            }
            
            grid.style.display = 'grid';
            empty.style.display = 'none';
            
            grid.innerHTML = mockListings.map(item => `
                <div class="nft-card">
                    <div class="nft-image">${item.image}</div>
                    <div class="nft-info">
                        <div class="nft-title">${item.name}</div>
                        <div style="color: #666; font-size: 0.9rem; margin-bottom: 0.5rem;">卖家：${item.seller}</div>
                        <div class="nft-price">${item.price} ETH</div>
                        <button class="btn btn-buy" onclick="buyNFT(${item.id}, '${item.name}', '${item.price}')">
                            🛒 立即购买
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        // 加载出售页面
        function loadSellTab() {
            const grid = document.getElementById('sellGrid');
            const empty = document.getElementById('sellEmpty');
            
            if (!currentUser || mockMyNFTs.length === 0) {
                grid.style.display = 'none';
                empty.style.display = 'block';
                return;
            }
            
            grid.style.display = 'grid';
            empty.style.display = 'none';
            
            grid.innerHTML = mockMyNFTs.map(item => `
                <div class="nft-card">
                    <div class="nft-image">${item.image}</div>
                    <div class="nft-info">
                        <div class="nft-title">${item.name}</div>
                        <div style="color: #666; font-size: 0.9rem; margin-bottom: 0.5rem;">Token ID: ${item.tokenId}</div>
                        <input type="number" id="price_${item.tokenId}" placeholder="价格 (ETH)" 
                               step="0.01" min="0" style="width: 100%; padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 0.5rem;">
                        <button class="btn btn-sell" onclick="listNFT(${item.tokenId}, '${item.name}')">
                            📤 上架出售
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        // 加载我的交易页面
        function loadMyTab() {
            const grid = document.getElementById('myGrid');
            const empty = document.getElementById('myEmpty');
            
            // 这里应该从合约读取用户的交易记录
            grid.style.display = 'none';
            empty.style.display = 'block';
        }
        
        // 购买 NFT
        async function buyNFT(listingId, name, price) {
            try {
                if (!currentUser) {
                    alert('请先解锁钱包！');
                    return;
                }
                
                if (!confirm(`确认购买 "${name}" 吗？\n价格：${price} ETH`)) {
                    return;
                }
                
                showStatus('pending', '⏳ 正在处理购买...');
                
                // 调用合约购买
                const result = await contractManager.buyNFT(listingId);
                
                showStatus('success', 
                    `✅ 购买成功!<br>
                     NFT: ${name}<br>
                     交易哈希：<a href="https://goerli.etherscan.io/tx/${result.txHash}" target="_blank">${result.txHash}</a>`
                );
                
                // 刷新列表
                loadBuyTab();
                
            } catch (error) {
                console.error('❌ 购买失败:', error);
                showStatus('error', '❌ 购买失败：' + error.message);
            }
        }
        
        // 上架 NFT
        async function listNFT(tokenId, name) {
            try {
                if (!currentUser) {
                    alert('请先解锁钱包！');
                    return;
                }
                
                const priceInput = document.getElementById(`price_${tokenId}`);
                const price = priceInput.value;
                
                if (!price || parseFloat(price) <= 0) {
                    alert('请输入有效的价格！');
                    return;
                }
                
                if (!confirm(`确认上架 "${name}" 吗？\n价格：${price} ETH`)) {
                    return;
                }
                
                showStatus('pending', '⏳ 正在上架 NFT...');
                
                // 调用合约上架
                const result = await contractManager.listNFT(tokenId, price, 86400 * 7); // 7 天
                
                showStatus('success', 
                    `✅ 上架成功!<br>
                     NFT: ${name}<br>
                     上架 ID: ${result.listingId}<br>
                     交易哈希：<a href="https://goerli.etherscan.io/tx/${result.txHash}" target="_blank">${result.txHash}</a>`
                );
                
                // 刷新列表
                loadSellTab();
                
            } catch (error) {
                console.error('❌ 上架失败:', error);
                showStatus('error', '❌ 上架失败：' + error.message);
            }
        }
        
        // 显示状态
        function showStatus(type, message) {
            const statusBox = document.getElementById('statusBox');
            const statusTitle = document.getElementById('statusTitle');
            const statusMessage = document.getElementById('statusMessage');
            
            statusBox.className = 'status-box show status-' + type;
            
            const icons = {
                success: '✅',
                error: '❌',
                pending: '⏳'
            };
            
            statusTitle.textContent = icons[type] + ' ' + 
                (type === 'success' ? '成功' : type === 'error' ? '失败' : '处理中');
            statusMessage.innerHTML = message;
            
            if (type === 'success' || type === 'error') {
                setTimeout(() => {
                    statusBox.classList.remove('show');
                }, 10000);
            }
        }
        
        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
