<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT 详情 - 硅基世界</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* 导航栏 */
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            padding: 1rem 2rem;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
            text-decoration: none;
        }
        
        .nav-links { display: flex; gap: 2rem; }
        .nav-links a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
        }
        .nav-links a:hover { color: #667eea; }
        
        /* 返回按钮 */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: white;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            background: rgba(255,255,255,0.2);
            border-radius: 25px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .back-btn:hover { background: rgba(255,255,255,0.3); }
        
        /* 主卡片 */
        .nft-detail {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .nft-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
        }
        
        /* NFT 图片区域 */
        .nft-image-section {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 500px;
        }
        
        .nft-image {
            font-size: 8rem;
            text-align: center;
        }
        
        .nft-image img {
            max-width: 100%;
            max-height: 500px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        /* NFT 信息区域 */
        .nft-info-section {
            padding: 3rem;
        }
        
        .nft-type-badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        
        .nft-title {
            font-size: 2.5rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 1rem;
        }
        
        .nft-description {
            color: #666;
            line-height: 1.8;
            margin-bottom: 2rem;
        }
        
        /* 价格区域 */
        .price-section {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
        }
        
        .price-label {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 0.5rem;
        }
        
        .price-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #667eea;
        }
        
        .price-usd {
            color: #999;
            font-size: 1rem;
            margin-top: 0.25rem;
        }
        
        /* 操作按钮 */
        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .btn {
            flex: 1;
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }
        
        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }
        
        /* NFT 属性 */
        .attributes {
            margin-bottom: 2rem;
        }
        
        .attributes-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 1rem;
        }
        
        .attributes-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }
        
        .attribute-item {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 8px;
        }
        
        .attribute-label {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 0.25rem;
        }
        
        .attribute-value {
            font-weight: 600;
            color: #333;
        }
        
        /* 卖家信息 */
        .seller-section {
            background: #f8f9fa;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
        }
        
        .seller-title {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 0.75rem;
        }
        
        .seller-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .seller-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .seller-name {
            font-weight: 600;
            color: #333;
        }
        
        .seller-address {
            font-size: 0.85rem;
            color: #999;
        }
        
        /* 交易历史 */
        .history-section {
            border-top: 2px solid #f0f0f0;
            padding-top: 2rem;
        }
        
        .history-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 1rem;
        }
        
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .history-event {
            font-weight: 600;
            color: #333;
        }
        
        .history-price {
            color: #667eea;
            font-weight: 600;
        }
        
        .history-time {
            color: #999;
            font-size: 0.85rem;
        }
        
        /* 稀有度徽章 */
        .rarity-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 0.5rem 1.25rem;
            border-radius: 25px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .rarity-legendary { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .rarity-epic { background: linear-gradient(135deg, #667eea, #764ba2); }
        .rarity-rare { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .rarity-common { background: linear-gradient(135deg, #666, #999); }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .nft-grid { grid-template-columns: 1fr; }
            .nft-image-section { min-height: 300px; padding: 2rem; }
            .nft-info-section { padding: 2rem; }
            .attributes-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 导航栏 -->
        <nav class="navbar">
            <a href="../dashboard/index.html" class="logo">🌍 硅基世界</a>
            <div class="nav-links">
                <a href="index.html">市场</a>
                <a href="collection.html">我的 NFT</a>
                <a href="create.html">创建</a>
                <a href="activity.html">活动</a>
                <a href="#" class="btn" style="background: #667eea; color: white; padding: 0.5rem 1.5rem; border-radius: 20px; text-decoration: none;">🔗 连接钱包</a>
            </div>
        </nav>
        
        <!-- 返回按钮 -->
        <a href="index.html" class="back-btn">← 返回市场</a>
        
        <!-- NFT 详情 -->
        <div class="nft-detail">
            <div class="nft-grid">
                <!-- 图片区域 -->
                <div class="nft-image-section" style="position: relative;">
                    <span class="rarity-badge rarity-legendary" id="rarityBadge">🔥 传说</span>
                    <div class="nft-image" id="nftImage">🏠</div>
                </div>
                
                <!-- 信息区域 -->
                <div class="nft-info-section">
                    <span class="nft-type-badge" id="nftType">土地</span>
                    <h1 class="nft-title" id="nftTitle">中心城地块 #001</h1>
                    <p class="nft-description" id="nftDescription">
                        位于硅基世界中心城的珍贵地块，坐标 (100, 200)，面积 1000 平方米。
                        可用于建造商业建筑、住宅或公共设施。周边交通便利，是投资的理想选择。
                    </p>
                    
                    <!-- 价格 -->
                    <div class="price-section">
                        <div class="price-label">当前价格</div>
                        <div class="price-value" id="nftPrice">1,000 SIL</div>
                        <div class="price-usd" id="nftPriceUsd">≈ $2,000 USD</div>
                    </div>
                    
                    <!-- 操作按钮 -->
                    <div class="action-buttons">
                        <button class="btn btn-primary" onclick="buyNow()">🛒 立即购买</button>
                        <button class="btn btn-secondary" onclick="makeOffer()">💰 出价</button>
                    </div>
                    
                    <!-- 卖家信息 -->
                    <div class="seller-section">
                        <div class="seller-title">卖家</div>
                        <div class="seller-info">
                            <div class="seller-avatar">👤</div>
                            <div>
                                <div class="seller-name" id="sellerName">SiliconWhale</div>
                                <div class="seller-address" id="sellerAddress">0x1234...5678</div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 属性 -->
                    <div class="attributes">
                        <div class="attributes-title">属性</div>
                        <div class="attributes-grid" id="attributesGrid">
                            <div class="attribute-item">
                                <div class="attribute-label">坐标</div>
                                <div class="attribute-value">(100, 200)</div>
                            </div>
                            <div class="attribute-item">
                                <div class="attribute-label">面积</div>
                                <div class="attribute-value">1000 m²</div>
                            </div>
                            <div class="attribute-item">
                                <div class="attribute-label">区域</div>
                                <div class="attribute-value">中心城</div>
                            </div>
                            <div class="attribute-item">
                                <div class="attribute-label">稀有度</div>
                                <div class="attribute-value" style="color: #f5576c;">传说</div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 交易历史 -->
                    <div class="history-section">
                        <div class="history-title">交易历史</div>
                        <div class="history-list" id="historyList">
                            <div class="history-item">
                                <div>
                                    <div class="history-event">上架出售</div>
                                    <div class="history-time">2 小时前</div>
                                </div>
                                <div class="history-price">1,000 SIL</div>
                            </div>
                            <div class="history-item">
                                <div>
                                    <div class="history-event">铸造</div>
                                    <div class="history-time">3 天前</div>
                                </div>
                                <div class="history-price">500 SIL</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // NFT 数据 (模拟)
        const nftData = {
            1: {
                id: 1,
                type: '土地',
                title: '中心城地块 #001',
                description: '位于硅基世界中心城的珍贵地块，坐标 (100, 200)，面积 1000 平方米。可用于建造商业建筑、住宅或公共设施。周边交通便利，是投资的理想选择。',
                price: 1000,
                image: '🏠',
                rarity: 'legendary',
                rarityName: '传说',
                seller: { name: 'SiliconWhale', address: '0x1234...5678' },
                attributes: { '坐标': '(100, 200)', '面积': '1000 m²', '区域': '中心城', '稀有度': '传说' }
            },
            2: {
                id: 2,
                type: '建筑',
                title: '商业大厦 #042',
                description: '现代化商业大厦，共 50 层，位于金融区核心位置。已配备完整的基础设施和智能管理系统。',
                price: 5000,
                image: '🏢',
                rarity: 'epic',
                rarityName: '史诗',
                seller: { name: 'BuilderPro', address: '0xabcd...efgh' },
                attributes: { '楼层': '50', '容量': '10000 人', '区域': '金融区', '稀有度': '史诗' }
            },
            3: {
                id: 3,
                type: '艺术品',
                title: '数字艺术 #123',
                description: '由知名数字艺术家创作的抽象艺术作品，使用 AI 生成算法，独一无二。',
                price: 500,
                image: '🎨',
                rarity: 'rare',
                rarityName: '稀有',
                seller: { name: 'ArtMaster', address: '0x9876...5432' },
                attributes: { '艺术家': 'AI_Artist', '尺寸': '4096x4096', '格式': 'PNG', '稀有度': '稀有' }
            }
        };
        
        // 从 URL 获取 NFT ID
        function getNFTId() {
            const params = new URLSearchParams(window.location.search);
            return parseInt(params.get('id')) || 1;
        }
        
        // 加载 NFT 详情
        function loadNFTDetail() {
            const id = getNFTId();
            const nft = nftData[id] || nftData[1];
            
            document.getElementById('nftType').textContent = nft.type;
            document.getElementById('nftTitle').textContent = nft.title;
            document.getElementById('nftDescription').textContent = nft.description;
            document.getElementById('nftPrice').textContent = `${nft.price.toLocaleString()} SIL`;
            document.getElementById('nftPriceUsd').textContent = `≈ $${(nft.price * 2).toLocaleString()} USD`;
            document.getElementById('nftImage').textContent = nft.image;
            document.getElementById('sellerName').textContent = nft.seller.name;
            document.getElementById('sellerAddress').textContent = nft.seller.address;
            
            // 稀有度
            const rarityBadge = document.getElementById('rarityBadge');
            rarityBadge.className = `rarity-badge rarity-${nft.rarity}`;
            rarityBadge.textContent = `🔥 ${nft.rarityName}`;
            
            // 属性
            const attrsGrid = document.getElementById('attributesGrid');
            attrsGrid.innerHTML = Object.entries(nft.attributes).map(([key, value]) => `
                <div class="attribute-item">
                    <div class="attribute-label">${key}</div>
                    <div class="attribute-value">${value}</div>
                </div>
            `).join('');
        }
        
        // 立即购买
        function buyNow() {
            const id = getNFTId();
            const nft = nftData[id] || nftData[1];
            if (confirm(`确认购买 "${nft.title}" 吗？\n价格：${nft.price.toLocaleString()} SIL`)) {
                alert('🎉 购买成功！\n\nNFT 已添加到您的收藏。\n交易哈希：0x' + Math.random().toString(16).substr(2, 40));
            }
        }
        
        // 出价
        function makeOffer() {
            const offer = prompt('请输入您的出价 (SIL):', '800');
            if (offer && !isNaN(offer)) {
                alert(`💰 出价成功！\n\n您的出价：${offer} SIL\n卖家将在 24 小时内回复。`);
            }
        }
        
        // 连接钱包
        document.querySelector('.btn').addEventListener('click', function(e) {
            e.preventDefault();
            alert('🔗 钱包连接功能即将上线！\n\n支持的钱包：\n• MetaMask\n• WalletConnect\n• Coinbase Wallet');
        });
        
        // 初始化
        window.addEventListener('DOMContentLoaded', loadNFTDetail);
    </script>
</body>
</html>
