<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>硅基世界 - 3D UI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        #canvas { width: 100vw; height: 100vh; display: block; }
        
        /* HUD */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        /* 准星 */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
        }
        #crosshair::before {
            width: 2px;
            height: 20px;
            left: 9px;
            top: 0;
        }
        #crosshair::after {
            width: 20px;
            height: 2px;
            left: 0;
            top: 9px;
        }
        
        /* 状态栏 */
        #status-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 30px;
            border-radius: 12px;
            pointer-events: auto;
        }
        
        .status-item {
            text-align: center;
            color: white;
        }
        
        .status-label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
        }
        
        .status-value {
            font-size: 20px;
            font-weight: bold;
            color: #6200ee;
        }
        
        /* 物品栏 */
        #inventory {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 8px;
            pointer-events: auto;
        }
        
        .inventory-slot {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .inventory-slot:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #6200ee;
        }
        
        .inventory-slot.selected {
            border-color: #6200ee;
            background: rgba(98, 0, 238, 0.3);
        }
        
        /* 交互提示 */
        #interaction-prompt {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            pointer-events: none;
            display: none;
        }
        
        /* 任务列表 */
        #quest-log {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 20px;
            border-radius: 12px;
            min-width: 250px;
            pointer-events: auto;
        }
        
        #quest-log h3 {
            margin-bottom: 15px;
            color: #6200ee;
        }
        
        .quest-item {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .quest-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .quest-title {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .quest-description {
            font-size: 14px;
            color: #aaa;
        }
        
        /* 设置按钮 */
        #settings-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            pointer-events: auto;
            font-size: 16px;
        }
        
        #settings-btn:hover {
            background: rgba(98, 0, 238, 0.7);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="hud">
        <!-- 准星 -->
        <div id="crosshair"></div>
        
        <!-- 交互提示 -->
        <div id="interaction-prompt">[E] 交互</div>
        
        <!-- 物品栏 -->
        <div id="inventory">
            <div class="inventory-slot selected" data-slot="0">🗡️</div>
            <div class="inventory-slot" data-slot="1">🛡️</div>
            <div class="inventory-slot" data-slot="2">🧪</div>
            <div class="inventory-slot" data-slot="3">📜</div>
            <div class="inventory-slot" data-slot="4">🗝️</div>
        </div>
        
        <!-- 状态栏 -->
        <div id="status-bar">
            <div class="status-item">
                <div class="status-label">生命</div>
                <div class="status-value" id="health">100</div>
            </div>
            <div class="status-item">
                <div class="status-label">魔法</div>
                <div class="status-value" id="mana">50</div>
            </div>
            <div class="status-item">
                <div class="status-label">体力</div>
                <div class="status-value" id="stamina">80</div>
            </div>
        </div>
        
        <!-- 任务列表 -->
        <div id="quest-log">
            <h3>📋 当前任务</h3>
            <div class="quest-item">
                <div class="quest-title">探索硅基世界</div>
                <div class="quest-description">熟悉这个虚拟世界的环境</div>
                <div style="margin-top: 5px; color: #6200ee;">进度：0/10</div>
            </div>
            <div class="quest-item">
                <div class="quest-title">第一个朋友</div>
                <div class="quest-description">添加一个好友</div>
                <div style="margin-top: 5px; color: #6200ee;">进度：0/1</div>
            </div>
        </div>
        
        <!-- 设置按钮 -->
        <button id="settings-btn">⚙️ 设置</button>
    </div>
    
    <script>
        // 物品栏选择
        document.querySelectorAll('.inventory-slot').forEach(slot => {
            slot.addEventListener('click', function() {
                document.querySelectorAll('.inventory-slot').forEach(s => s.classList.remove('selected'));
                this.classList.add('selected');
            });
        });
        
        // 键盘选择物品栏
        document.addEventListener('keydown', (e) => {
            const num = parseInt(e.key);
            if (num >= 1 && num <= 5) {
                document.querySelectorAll('.inventory-slot').forEach((s, i) => {
                    s.classList.toggle('selected', i === num - 1);
                });
            }
        });
        
        // 设置按钮
        document.getElementById('settings-btn').addEventListener('click', () => {
            alert('设置功能开发中...');
        });
        
        console.log('3D UI 已加载');
    </script>
</body>
</html>
